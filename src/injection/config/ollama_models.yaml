# Ollama Pro Bulut Model Yapılandırması
# API Key: OLLAMA_API_KEY ortam değişkeninden veya buradan
# Bulut mod: https://ollama.com
# Yerel mod: http://localhost:11434

# ── API Yapılandırması ──────────────────────────────────
base_url: "https://ollama.com"
api_key: "OLLAMA_API_KEY"  # Gerçek key'i .env dosyasına koyun!
timeout: 180

# ── Model Tanımları ─────────────────────────────────────
models:
  glm-5.1:
    id: "glm-5.1:cloud"
    description: "Genel amaç, Türkçe güçlü"
    context_length: 131072
    temperature: 0.3

  gemma4:
    id: "gemma4:31b-cloud"
    description: "Kod analizi, mimari tasarım"
    context_length: 131072
    temperature: 0.2

  minimax-m2.7:
    id: "minimax-m2.7:cloud"
    description: "Uzun metin, özetleme, tip tasarımı"
    context_length: 256000
    temperature: 0.3

  qwen3.5:
    id: "qwen3.5:cloud"
    description: "Çok dilli, mantık, analiz"
    context_length: 131072
    temperature: 0.3

  qwen3-coder:
    id: "qwen3-coder-next:cloud"
    description: "Kod üretimi, debugging, sadeleştirme"
    context_length: 131072
    temperature: 0.1

  nemotron-3:
    id: "nemotron-3-super:cloud"
    description: "Akıl yürütme, sessiz hata avcılığı"
    context_length: 131072
    temperature: 0.2

  kimi-k2.5:
    id: "kimi-k2.5:cloud"
    description: "Güvenlik tarama, red-teaming, saldırı üretimi"
    context_length: 131072
    temperature: 0.4

  gemini-flash:
    id: "gemini-3-flash-preview:cloud"
    description: "Hızlı iterasyon, döngü"
    context_length: 131072
    temperature: 0.3

  cogito:
    id: "cogito-2.1:671b-cloud"
    description: "Derin düşünme, planlama, koordinasyon"
    context_length: 131072
    temperature: 0.1

  deepseek:
    id: "deepseek-v3.2:cloud"
    description: "Güvenlik analizi, inceleme, enjeksiyon"
    context_length: 131072
    temperature: 0.2

# ── Ajan → Model Atamaları ──────────────────────────────
agent_model_map:
  # Güvenlik Tarama
  orchestrator: "cogito"
  data_leakage_scanner: "kimi-k2.5"
  indirect_injection_scanner: "deepseek"
  tool_abuse_scanner: "kimi-k2.5"
  attack_engine: "kimi-k2.5"

  # Geliştirme İş Akışı
  code_explorer: "qwen3.5"
  code_architect: "gemma4"
  code_reviewer_dev: "deepseek"

  # PR İnceleme
  comment_analyzer: "qwen3.5"
  test_analyzer: "qwen3-coder"
  silent_failure_hunter: "nemotron-3"
  type_design_analyzer: "minimax-m2.7"
  code_reviewer: "deepseek"
  code_simplifier: "qwen3-coder"

  # Ralph Loop
  planner: "cogito"
  executor: "gemini-flash"
  evaluator: "deepseek"

# ── Saldırı Motoru ──────────────────────────────────────
attack_engine:
  use_deepteam: true
  encoding_methods:
    - base64
    - caesar
    - leetspeak
    - ascii_smuggling
    - a1z26
    - mirror
    - affine
    - vaporwave
    - ogham
    - zalgo
  stego:
    enabled: true
    max_retries: 3
  stratasword:
    enabled: true
    techniques:
      - acrostic_poem
      - character_split
      - contradictory
      - opposing
      - shuffle
      - long_text
      - code_attack
      - drattack

# ── Tarama ───────────────────────────────────────────────
scan:
  max_turns_per_agent: 20
  max_findings_per_category: 1
  max_evasion_attempts: 2
  max_jailbreak_attempts: 1
  ssrf_verification:
    url: "https://tencent.github.io/AI-Infra-Guard/ssrf.html"
    token: "ba7c02c343a727917b6bfcb723927ce5"

# ── Rapor ─────────────────────────────────────────────────
report:
  output_format: "markdown"
  owasp_classification: true
  min_severity: "Low"
  false_positive_filter: true

# ── Ralph Loop ───────────────────────────────────────────
ralph_loop:
  default_max_iterations: 50
  completion_check_interval: 5
  dashboard_port: 8420
  dashboard_host: "127.0.0.1"

# ── Security Guard ───────────────────────────────────────
security_guard:
  enabled: true
  patterns:
    - name: "eval_injection"
      patterns: ["eval(", "new Function"]
      severity: "critical"
    - name: "command_injection"
      patterns: ["child_process.exec", "execSync(", "os.system", "subprocess.call"]
      severity: "critical"
    - name: "xss"
      patterns: ["dangerouslySetInnerHTML", ".innerHTML =", "document.write"]
      severity: "high"
    - name: "sql_injection"
      patterns: ["raw_query", "execute_sql", "cursor.execute(f"]
      severity: "high"
    - name: "deserialization"
      patterns: ["pickle.loads", "yaml.load(unsafe", "marshal.loads"]
      severity: "critical"
    - name: "github_actions"
      path_patterns: [".github/workflows/"]
      severity: "high"