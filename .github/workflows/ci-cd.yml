name: CyberSurX CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      
      - name: Initialize database
        run: |
          cd src
          python init_db.py
      
      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Initialize database
        run: |
          cd src
          python init_db.py
      
      - name: Test API integration
        run: |
          python -c "from src.api.main import app; from src.database import get_db; print('✅ API-Database integration OK')"
      
      - name: Test module integration
        run: |
          python tests/minimal_integration.py

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Syntax check all Python files
        run: |
          find src -name "*.py" -exec python -m py_compile {} \; && echo "All syntax OK"
      
      - name: CLI smoke test
        run: |
          python -m src.cli --help

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install bandit
        run: pip install bandit
      
      - name: Security scan
        run: bandit -r src/ -ll
